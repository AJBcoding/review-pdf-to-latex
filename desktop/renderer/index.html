<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!--
    CSP. PDF.js needs:
      - worker-src 'self' blob: — to instantiate its pdf.worker as a Worker
      - script-src 'self' blob: — Vite-bundled worker URLs and PDF.js's
        canvas painting can use blob: URLs
      - img-src adds blob: for canvas → ImageBitmap paths PDF.js takes on
        some PDF operators
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <title>review-pdf</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app" class="layout">
    <!--
      §3 left-drawer file tree. Header carries the root-folder label + the
      "Open Folder…" / "show hidden" controls; body renders the tree (or an
      empty-state prompt when no root is set).
    -->
    <aside class="pane left-drawer" data-pane="file-tree">
      <header class="pane-header tree-header">
        <span class="tree-header-title" id="treeTitle" title="No folder open">File tree</span>
        <span class="tree-header-controls">
          <button id="treeOpenFolder" type="button" title="Open Folder…">📁</button>
          <button id="treeToggleHidden" type="button" aria-pressed="false"
                  title="Show hidden files (.git, node_modules, dotfiles, …)">👁</button>
        </span>
      </header>
      <div class="pane-body tree-body" id="treeBody">
        <div class="placeholder" id="treeEmpty">
          <div>No folder open.</div>
          <div style="margin-top:6px"><a href="#" id="treeEmptyOpen">Open Folder…</a></div>
        </div>
      </div>
    </aside>

    <main class="pane middle" data-pane="document">
      <header class="pane-header pdf-nav" id="pdfNav">
        <span class="pdf-nav-title" id="pdfTitle">Document viewer</span>
        <span class="pdf-nav-controls">
          <button id="pdfOpen" type="button" title="Open a PDF (⌘O)">Open…</button>
          <span class="pdf-nav-sep" aria-hidden="true">│</span>
          <button id="pdfPrev" type="button" disabled>◀</button>
          <span id="pdfPageLabel" class="pdf-page-label">— / —</span>
          <button id="pdfNext" type="button" disabled>▶</button>
          <span class="pdf-nav-sep" aria-hidden="true">│</span>
          <button id="pdfFitPage" type="button" disabled title="Fit whole page in view">Fit page</button>
          <button id="pdfFitWidth" type="button" disabled title="Fit page width to view (scroll vertically)">Fit width</button>
          <span class="pdf-nav-sep" aria-hidden="true">│</span>
          <button id="pdfDarkToggle" type="button" disabled title="Toggle dark mode (§13.6 spike)">🌓</button>
        </span>
      </header>
      <!-- pdf-health banner (§5.2 load-time pre-flight). Hidden until a PDF
           is loaded; populated by the renderer based on the parsed report. -->
      <div id="pdfBanner" class="pdf-banner" hidden role="status" aria-live="polite"></div>
      <!-- round-status banner (§10.1 step 6). Hidden until the results-file
           watcher reflects a round into the UI. Distinct element from
           #pdfBanner so the two can stack when both are relevant. -->
      <div id="roundBanner" class="round-banner" hidden role="status" aria-live="polite"></div>
      <div class="pane-body document-area">
        <div class="pdf-empty" id="pdfEmpty">
          <div class="pdf-empty-title">No PDF loaded</div>
          <div class="pdf-empty-hint">Click <strong>Open…</strong> above to choose a PDF.</div>
        </div>
        <div class="pdf-mount" id="pdfMount" hidden></div>
      </div>
      <!--
        §4.2 tool palette — small icons between viewer and input. The active
        tool also sets the comment's engagement_level (§11.1: one click, one
        level, no extra picker).
      -->
      <div class="tool-palette" id="toolPalette" role="toolbar" aria-label="Comment tool">
        <button class="tool-btn is-active" data-tool="comment" type="button"
                aria-pressed="true" title="Comment — L1 (⌘1) — fix this, here's why">
          <span class="tool-icon" aria-hidden="true">💬</span><span class="tool-label">Comment</span>
        </button>
        <button class="tool-btn" data-tool="redraft" type="button"
                aria-pressed="false" title="Redraft — L2 (⌘2) — swap this text for new text">
          <span class="tool-icon" aria-hidden="true">✏️</span><span class="tool-label">Redraft</span>
        </button>
        <button class="tool-btn" data-tool="surface" type="button"
                aria-pressed="false" title="Surface — L3 (⌘3) — this needs a rethink">
          <span class="tool-icon" aria-hidden="true">🌊</span><span class="tool-label">Surface</span>
        </button>
      </div>
      <footer class="pane-footer">
        <!--
          §4.3 bottom input — always present. Enter submits, Shift+Enter for
          soft return. No half-typed persisted state (in-memory until Enter).
        -->
        <div class="comment-input" id="commentInputWrap">
          <div class="comment-input-meta">
            <span class="comment-input-anchor" id="commentAnchor">No selection — highlight text in the PDF to anchor a comment.</span>
            <button id="commentClear" type="button" class="comment-input-clear" title="Clear the input buffer (Esc)">✗ Clear</button>
          </div>
          <textarea id="commentInput" class="comment-input-textarea"
                    rows="2"
                    placeholder="Type a comment and press Enter to submit (Shift+Enter for a new line)."
                    aria-label="Comment, redraft, or surface text"></textarea>
        </div>
      </footer>
    </main>

    <aside class="pane right-drawer" data-pane="comments-and-claude">
      <header class="pane-header">Comments + Claude</header>
      <!--
        Right drawer comment stream. Milestone #3 echoes submitted comments
        here as raw JSON cards; the proper comment-card UI + persistence land
        in milestone #4 (§9.1, §10.3).
      -->
      <div class="pane-body comment-stream" id="commentStream">
        <div class="placeholder" id="commentStreamEmpty">No comments yet — highlight text in the PDF, pick a tool, and press Enter.</div>
      </div>
    </aside>
  </div>

  <!--
    §3.5 quick-open palette. Modal overlay, hidden until Cmd+P opens it.
    Eagerly indexed PDF list with fuzzy ranking; arrow keys navigate, Enter
    opens, Esc / click-outside dismisses. Lives outside the .layout grid so
    it can z-index above all panes without disturbing flex/grid sizing.
  -->
  <div id="palette" class="palette" hidden role="dialog" aria-modal="true" aria-label="Quick open">
    <div class="palette-card" role="document">
      <input id="paletteInput" class="palette-input" type="text" autocomplete="off"
             spellcheck="false" placeholder="Type to fuzzy-match PDF filename or path…" />
      <ul id="paletteList" class="palette-list" role="listbox" aria-label="Quick-open matches"></ul>
      <div id="paletteEmpty" class="palette-empty" hidden>No matches.</div>
    </div>
  </div>

  <div id="diag" class="diag" aria-live="polite"></div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
